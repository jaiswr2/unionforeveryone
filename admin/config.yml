backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "/"
display_url: "/"

collections:
  - name: "campaign"
    label: "Campaign Website"
    delete: false
    editor:
      preview: false
    files:
      - label: "Campaign Content"
        name: "campaign_content"
        file: "content/campaign.json"
        format: "json"
        fields:
          - { label: "Site Name", name: "siteName", widget: "string" }
          - { label: "Campaign Label", name: "campaignLabel", widget: "string" }
          - { label: "Hero Title", name: "heroTitle", widget: "string" }
          - { label: "Hero Intro", name: "heroLede", widget: "text" }
          - { label: "Section Title", name: "introTitle", widget: "string" }
          - { label: "Section Intro", name: "introText", widget: "text" }
          - { label: "Homepage Footer", name: "footerText", widget: "string" }
          - { label: "Profile Footer", name: "profileFooterText", widget: "string" }
          - label: "Candidates"
            name: "candidates"
            widget: "list"
            summary: "{{fields.position}} | {{fields.name}}"
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "Keep unique values like candidate-01" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Position", name: "position", widget: "string" }
              - { label: "Department", name: "department", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Photo", name: "image", widget: "image", required: false }
              - { label: "Statement", name: "statement", widget: "text" }
